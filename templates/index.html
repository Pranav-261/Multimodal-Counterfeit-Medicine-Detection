<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Medicine Authenticity Check</title>
    <style>
        body { font-family: sans-serif; margin: 2em; background-color: #f4f4f4; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type=file] { display: block; margin-bottom: 10px; }
        button { padding: 10px 15px; background-color: #5cb85c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #4cae4c; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #predictionResult { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; }
        .authentic { background-color: #dff0d8; color: #3c763d; }
        .counterfeit { background-color: #f2dede; color: #a94442; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Check Medicine Authenticity</h1>
        <p>Upload an image of the medicine packaging.</p>
        <form id="uploadForm" method="post" action="/predict" enctype="multipart/form-data">
            <div class="form-group">
                <label for="file">Choose Image:</label>
                <input type="file" id="file" name="file" accept="image/png, image/jpeg, image/jpg" required>
            </div>
            <button type="submit">Check Authenticity</button>
        </form>
        <div id="loader" class="loader"></div>
        <div id="predictionResult"></div> <!-- Area to potentially display results via JS later -->
    </div>

    <script>
        // Show loader on form submit
        document.getElementById('uploadForm').addEventListener('submit', function() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('predictionResult').innerHTML = ''; // Clear previous results
        });
    </script>
</body>
</html>
